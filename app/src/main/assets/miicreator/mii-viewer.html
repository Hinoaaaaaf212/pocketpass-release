<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        #container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #mii-render {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        .loading {
            color: #666;
            font-family: sans-serif;
            font-size: 14px;
        }
        .error {
            color: #d32f2f;
            font-family: sans-serif;
            font-size: 12px;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="loading">Loading Mii...</div>
    </div>

    <script>
        // Get the hex data from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const hexData = urlParams.get('data');
        const container = document.getElementById('container');

        console.log('Mii Viewer initialized with hex data:', hexData ? hexData.substring(0, 20) + '...' : 'null');

        if (!hexData) {
            console.error('No hex data provided in URL parameters');
            container.innerHTML = '<div class="error">No Mii data provided</div>';
        } else {
            // Construct the rendering API URL
            // Using all_body type with transparent background
            const renderURL = `https://mii-unsecure.ariankordi.net/miis/image.png?shaderType=wiiu&type=all_body&width=512&verifyCharInfo=0&data=${encodeURIComponent(hexData)}&cameraYRotate=0&characterYRotate=0&bgColor=00000000`;

            console.log('Loading Mii render from API...');
            console.log('Render URL:', renderURL);

            // Create the image element
            const img = document.createElement('img');
            img.id = 'mii-render';
            img.alt = 'Mii Avatar';

            let retryCount = 0;
            const maxRetries = 3;

            function tryLoadImage() {
                img.onload = function() {
                    console.log('Mii render loaded successfully');
                    container.innerHTML = '';
                    container.appendChild(img);
                };

                img.onerror = function(e) {
                    console.error('Failed to load Mii render (attempt ' + (retryCount + 1) + '/' + maxRetries + ')');
                    console.error('Error details:', e);

                    if (retryCount < maxRetries - 1) {
                        retryCount++;
                        console.log('Retrying in 1 second...');
                        setTimeout(tryLoadImage, 1000);
                    } else {
                        console.error('All retry attempts failed');
                        container.innerHTML = '<div class="error">Failed to load Mii avatar</div>';
                    }
                };

                img.src = renderURL;
            }

            tryLoadImage();
        }
    </script>
</body>
</html>
